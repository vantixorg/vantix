name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version without the leading v (e.g. 0.2.0)"
        required: true
      dry_run:
        description: "Build + pack only"
        type: boolean
        default: true

permissions:
  contents: read

env:
  PACK_ID: "Vantix"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      launcher_changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ github.event.inputs.version }}"
          fi
          [ -z "$V" ] && { echo "::error::no version"; exit 1; }
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Releasing version $V"

      - name: Detect launcher changes
        id: diff
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
            echo "Previous tag: ${PREV:-none}"
            if [ -z "$PREV" ] || git diff --name-only "$PREV" "${GITHUB_REF_NAME}" -- Patcher/ | grep -q .; then
              CHANGED=true
            else
              CHANGED=false
            fi
          else
            CHANGED=true
          fi
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "launcher_changed=$CHANGED"

  build:
    needs: setup
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: "Windows"
            export_subdir: "Windows"
            launcher_exe: VantixLauncher.exe
            installer_glob: "Releases/*Setup.exe"
            artifact: installer-windows
            engine_artifact: engine-windows
            editor_rel: "../Engine/Editor_console.exe"
          - os: ubuntu-latest
            preset: "Linux"
            export_subdir: "Linux"
            launcher_exe: VantixLauncher
            installer_glob: "Releases/*.AppImage"
            artifact: installer-linux
            engine_artifact: engine-linux
            editor_rel: "../Engine/Editor.x86_64"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Fetch game LFS assets
        shell: bash
        run: git lfs pull --include="Game/**"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Download custom engine
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          RUN_ID=$(gh run list --workflow build-engine.yml --status success \
            --branch main --limit 1 --json databaseId -q '.[0].databaseId')
          if [ -z "$RUN_ID" ]; then
            echo "::error::No successful 'Build Engine' run found. Run that workflow first."
            exit 1
          fi
          echo "Downloading engine from build-engine run $RUN_ID"
          gh run download "$RUN_ID" -n "${{ matrix.engine_artifact }}" -D Engine

      - name: Download patcher
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG=$(gh release list --limit 100 --json tagName,isDraft,createdAt \
            -q '[.[] | select(.isDraft==false) | select(.tagName|startswith("patcher-"))] | sort_by(.createdAt) | last | .tagName')
          if [ -z "$TAG" ]; then
            exit 1
          fi
          echo "Using patcher release $TAG"
          gh release download "$TAG" -p "${{ matrix.launcher_exe }}" -D publish/app

      - name: Make binaries executable (Linux)
        if: runner.os == 'Linux'
        run: chmod +x Engine/Editor.x86_64 Engine/Templates/linux_release.x86_64 "publish/app/${{ matrix.launcher_exe }}"

      - name: Build C# (ExportRelease)
        shell: bash
        run: dotnet build Game/vantix.csproj -c ExportRelease -nologo

      - name: Godot import pass
        working-directory: Game
        shell: bash
        env:
          EDITOR: ${{ matrix.editor_rel }}
        run: |
          "$EDITOR" --headless --path . --import --quit || true

      - name: Export game (${{ matrix.preset }})
        working-directory: Game
        shell: bash
        env:
          EDITOR: ${{ matrix.editor_rel }}
        run: |
          mkdir -p "../Export/${{ matrix.export_subdir }}"
          "$EDITOR" --headless --path . --export-release "${{ matrix.preset }}"

      - name: Stage package
        shell: bash
        run: |
          mkdir -p publish/app/game
          cp -r "Export/${{ matrix.export_subdir }}/." publish/app/game/
          test -f "publish/app/${{ matrix.launcher_exe }}" || { echo "::error::launcher missing"; ls -la publish/app; exit 1; }

      - name: Install Velopack CLI
        shell: bash
        run: |
          dotnet tool install -g vpk
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Download previous release (for delta)
        continue-on-error: true
        shell: bash
        run: |
          vpk download s3 \
            --endpoint "${{ secrets.R2_ENDPOINT }}" \
            --bucket "${{ secrets.R2_BUCKET }}" \
            --keyId "${{ secrets.R2_ACCESS_KEY_ID }}" \
            --secret "${{ secrets.R2_SECRET_ACCESS_KEY }}" \
            --region auto

      - name: Pack
        shell: bash
        run: |
          vpk pack \
            --packId "${{ env.PACK_ID }}" \
            --packVersion "${{ needs.setup.outputs.version }}" \
            --packDir publish/app \
            --mainExe "${{ matrix.launcher_exe }}" \
            --packTitle "Vantix" \
            --packAuthors "Red Ninjas"

      - name: Upload to R2
        if: github.event.inputs.dry_run != 'true'
        shell: bash
        run: |
          vpk upload s3 \
            --endpoint "${{ secrets.R2_ENDPOINT }}" \
            --bucket "${{ secrets.R2_BUCKET }}" \
            --keyId "${{ secrets.R2_ACCESS_KEY_ID }}" \
            --secret "${{ secrets.R2_SECRET_ACCESS_KEY }}" \
            --region auto

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.installer_glob }}
          if-no-files-found: error

  release:
    needs: [setup, build]
    if: needs.setup.outputs.launcher_changed == 'true' && github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create draft release with installers
        id: rel
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.setup.outputs.version }}
          name: Vantix v${{ needs.setup.outputs.version }}
          files: dist/**/*
          generate_release_notes: true
          draft: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X PATCH repos/${{ github.repository }}/releases/${{ steps.rel.outputs.id }} -F draft=false
