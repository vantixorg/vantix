name: Build Patcher

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Patcher/**'
      - '.github/workflows/build-patcher.yml'

permissions:
  contents: write

jobs:
  patcher:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: patcher-windows
          - os: ubuntu-latest
            rid: linux-x64
            artifact: patcher-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Fetch patcher LFS assets
        run: git lfs pull --include="Patcher/**"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish launcher
        run: dotnet publish Patcher/Patcher.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o publish/app

      - name: Upload patcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/app
          retention-days: 90
          if-no-files-found: error

  publish:
    needs: patcher
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download patcher builds
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create draft release with assets
        id: draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: patcher-${{ github.run_number }}
          name: Patcher build ${{ github.run_number }}
          draft: true
          prerelease: true
          files: |
            dist/patcher-windows/VantixLauncher.exe
            dist/patcher-linux/VantixLauncher

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X PATCH repos/${{ github.repository }}/releases/${{ steps.draft.outputs.id }} -F draft=false
